<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gallatin County Sheriff's Office AVL</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial;
    }

    #wrap {
      display: flex;
      height: 100%;
    }

    #sidebar {
      width: 360px;
      background: #111;
      color: white;
      padding: 10px;
      overflow-y: auto;
    }

    #map {
      flex: 1;
    }

    input, button, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    #gpsStatus, #fixDetails, #rawNmea {
      margin-top: 10px;
      padding: 8px;
      background: #1c1c1c;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #loginScreen {
      position: fixed;
      inset: 0;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    #loginScreen input,
    #loginScreen select,
    #loginScreen button {
      max-width: 300px;
    }

    .good { color: lime; }
    .bad { color: red; }
    .warn { color: orange; }

    @media (max-width: 768px) {
      #wrap {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: 45vh;
      }

      #map {
        height: 55vh;
      }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Gallatin County Sheriff's Office AVL</h2>

  <input id="loginUnitId" placeholder="Unit ID" />

  <select id="loginMode">
    <option value="unit">Unit</option>
    <option value="dispatch">Dispatch</option>
  </select>

  <button onclick="login()">Enter System</button>
</div>

<div id="wrap">

  <div id="sidebar">
    <h3>Gallatin County Sheriff's Office AVL</h3>

    <input id="unitId" placeholder="Unit ID" />

    <hr>

    <button onclick="setUnitStatus('10-8')">10-8 Available</button>
    <button onclick="setUnitStatus('10-7')">10-7 Out</button>
    <button onclick="setUnitStatus('10-6')">10-6 Busy</button>

    <hr>

    <label>Baud Rate</label>
    <select id="baudRate">
      <option value="4800">4800</option>
      <option value="9600" selected>9600</option>
      <option value="38400">38400</option>
      <option value="115200">115200</option>
    </select>

    <button onclick="connectSerialGPS()">Connect Serial GPS</button>
    <button onclick="disconnectSerialGPS()">Disconnect Serial GPS</button>
    <button onclick="startBrowserGPS()">Start Browser GPS Fallback</button>

    <hr>

    <button onclick="logOffUnit()">Log Off Unit</button>
    <button onclick="forceRemoveUnit()">Force Remove Unit</button>
    <button onclick="logout()">Logout</button>

    <div id="gpsStatus">GPS: Disconnected</div>
    <div id="fixDetails">Fix details will appear here.</div>
    <div id="rawNmea">Raw NMEA will appear here.</div>
  </div>

  <div id="map"></div>

</div>

<script>
//////////////////////////////////////////////////////
// FIREBASE
//////////////////////////////////////////////////////

const firebaseConfig = {
  apiKey: "AIzaSyA5hXURTrwoUkMRBkI2iEYU74CsG4z_vcU",
  authDomain: "gcso-avl.firebaseapp.com",
  databaseURL: "https://gcso-avl-default-rtdb.firebaseio.com",
  projectId: "gcso-avl"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const unitsRef = db.ref("units");

//////////////////////////////////////////////////////
// MAP
//////////////////////////////////////////////////////

const map = L.map("map").setView([38.9, -84.5], 10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map);

let markers = {};
let currentUnitId = null;
let currentStatus = "10-8";
let userMode = "unit";
let browserWatchId = null;

//////////////////////////////////////////////////////
// LOGIN / SESSION
//////////////////////////////////////////////////////

function restoreLogin() {
  const savedId = localStorage.getItem("avl_unitId");
  const savedMode = localStorage.getItem("avl_mode");

  if (!savedId) return;

  currentUnitId = savedId;
  userMode = savedMode || "unit";

  document.getElementById("unitId").value = savedId;
  document.getElementById("loginScreen").style.display = "none";

  setStatus(`Session restored for ${savedId}`, "good");
}

function login() {
  const id = document.getElementById("loginUnitId").value.trim();
  const mode = document.getElementById("loginMode").value;

  if (!id) return alert("Enter ID");

  currentUnitId = id;
  userMode = mode;

  localStorage.setItem("avl_unitId", id);
  localStorage.setItem("avl_mode", mode);

  document.getElementById("unitId").value = id;
  document.getElementById("loginScreen").style.display = "none";

  setStatus(`Logged in as ${id} (${mode})`, "good");
}

async function logout() {
  if (browserWatchId !== null) {
    navigator.geolocation.clearWatch(browserWatchId);
    browserWatchId = null;
  }

  await disconnectSerialGPS();

  if (currentUnitId) {
    await unitsRef.child(currentUnitId).remove();
  }

  if (currentUnitId && markers[currentUnitId]) {
    map.removeLayer(markers[currentUnitId]);
    delete markers[currentUnitId];
  }

  currentUnitId = null;
  userMode = null;

  localStorage.removeItem("avl_unitId");
  localStorage.removeItem("avl_mode");

  document.getElementById("unitId").value = "";
  document.getElementById("loginScreen").style.display = "flex";

  setStatus("Logged out", "warn");
}

restoreLogin();

//////////////////////////////////////////////////////
// STATUS BUTTONS
//////////////////////////////////////////////////////

function setUnitStatus(status) {
  currentStatus = status;

  if (currentUnitId) {
    unitsRef.child(currentUnitId).update({
      status: currentStatus
    });
  }

  setStatus(`Status set to ${status}`, "good");
}

//////////////////////////////////////////////////////
// WAKE LOCK / BACKGROUND SAFEGUARDS
//////////////////////////////////////////////////////

let wakeLock = null;

async function enableWakeLock() {
  if (!("wakeLock" in navigator)) {
    console.log("Wake Lock not supported in this browser");
    return;
  }

  try {
    wakeLock = await navigator.wakeLock.request("screen");
    console.log("Wake Lock active");
  } catch (err) {
    console.log("Wake Lock failed:", err.message);
  }
}

enableWakeLock();

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    enableWakeLock();

    setTimeout(() => {
      map.invalidateSize();
    }, 300);
  }
});

window.addEventListener("beforeunload", (e) => {
  e.preventDefault();
  e.returnValue =
    "Tracking will stop if Gallatin County Sheriff's Office AVL is closed.";
});

//////////////////////////////////////////////////////
// SERIAL STATE
//////////////////////////////////////////////////////

let serialPort = null;
let serialReader = null;
let serialKeepReading = false;
let serialBuffer = "";

let lastValidFixTime = 0;
let lastFix = null;

//////////////////////////////////////////////////////
// BROWSER SUPPORT CHECK
//////////////////////////////////////////////////////

if (!("serial" in navigator)) {
  setStatus("Web Serial not supported. Use Chrome or Edge.", "bad");
}

//////////////////////////////////////////////////////
// STATUS HELPERS
//////////////////////////////////////////////////////

function setStatus(message, className = "") {
  const el = document.getElementById("gpsStatus");
  el.className = className;
  el.innerText = message;
}

function setFixDetails(message) {
  document.getElementById("fixDetails").innerText = message;
}

function setRawNmea(sentence) {
  document.getElementById("rawNmea").innerText = sentence;
}

//////////////////////////////////////////////////////
// CONNECT SERIAL GPS
//////////////////////////////////////////////////////

async function connectSerialGPS() {
  const id = document.getElementById("unitId").value.trim();
  if (!id) return alert("Enter Unit ID first");

  if (!("serial" in navigator)) {
    alert("Web Serial is not supported in this browser. Use Chrome or Edge.");
    return;
  }

  currentUnitId = id;
  localStorage.setItem("avl_unitId", id);
  localStorage.setItem("avl_mode", userMode || "unit");

  try {
    const baudRate = parseInt(document.getElementById("baudRate").value, 10);

    serialPort = await navigator.serial.requestPort();

    await serialPort.open({
      baudRate: baudRate,
      dataBits: 8,
      stopBits: 1,
      parity: "none",
      flowControl: "none"
    });

    setStatus(`Serial GPS connected at ${baudRate} baud`, "good");

    serialKeepReading = true;
    readSerialLoop();

  } catch (err) {
    console.error(err);
    setStatus("Serial GPS connection failed: " + err.message, "bad");
    alert("Serial GPS connection failed: " + err.message);
  }
}

//////////////////////////////////////////////////////
// DISCONNECT SERIAL GPS
//////////////////////////////////////////////////////

async function disconnectSerialGPS() {
  serialKeepReading = false;

  try {
    if (serialReader) {
      await serialReader.cancel();
      serialReader.releaseLock();
      serialReader = null;
    }

    if (serialPort) {
      await serialPort.close();
      serialPort = null;
    }

    setStatus("Serial GPS disconnected", "warn");

  } catch (err) {
    console.error(err);
    setStatus("Disconnect error: " + err.message, "bad");
  }
}

//////////////////////////////////////////////////////
// READ SERIAL LOOP
//////////////////////////////////////////////////////

async function readSerialLoop() {
  const decoder = new TextDecoder();

  try {
    while (serialPort && serialPort.readable && serialKeepReading) {
      serialReader = serialPort.readable.getReader();

      try {
        while (serialKeepReading) {
          const { value, done } = await serialReader.read();

          if (done) break;
          if (!value) continue;

          serialBuffer += decoder.decode(value, { stream: true });

          let lines = serialBuffer.split(/\r?\n/);
          serialBuffer = lines.pop();

          for (const rawLine of lines) {
            const sentence = rawLine.trim();
            if (sentence) handleNMEA(sentence);
          }
        }
      } finally {
        serialReader.releaseLock();
        serialReader = null;
      }
    }
  } catch (err) {
    console.error(err);
    setStatus("Serial read error: " + err.message, "bad");
  }
}

//////////////////////////////////////////////////////
// NMEA HANDLER
//////////////////////////////////////////////////////

function handleNMEA(sentence) {
  setRawNmea(sentence);

  if (!sentence.startsWith("$")) return;

  if (!isChecksumValid(sentence)) {
    setStatus("Bad NMEA checksum ignored", "warn");
    return;
  }

  const type = sentence.split(",")[0];

  if (
    type === "$GPRMC" ||
    type === "$GNRMC" ||
    type === "$GARMC" ||
    type === "$GLRMC"
  ) {
    parseRMC(sentence);
    return;
  }

  if (
    type === "$GPGGA" ||
    type === "$GNGGA" ||
    type === "$GAGGA" ||
    type === "$GLGGA"
  ) {
    parseGGA(sentence);
    return;
  }
}

//////////////////////////////////////////////////////
// CHECKSUM VALIDATION
//////////////////////////////////////////////////////

function isChecksumValid(sentence) {
  const star = sentence.indexOf("*");

  // Some receivers omit checksum. Do not kill the feed for that.
  if (star === -1) return true;

  const data = sentence.substring(1, star);
  const supplied = sentence.substring(star + 1).trim().toUpperCase();

  let checksum = 0;
  for (let i = 0; i < data.length; i++) {
    checksum ^= data.charCodeAt(i);
  }

  const calculated = checksum.toString(16).toUpperCase().padStart(2, "0");
  return calculated === supplied;
}

//////////////////////////////////////////////////////
// RMC PARSER
//////////////////////////////////////////////////////

function parseRMC(sentence) {
  const parts = sentence.split(",");

  const fixStatus = parts[2]; // A = valid, V = void
  if (fixStatus !== "A") {
    setStatus("RMC received but fix is not valid", "warn");
    return;
  }

  const lat = nmeaToDecimal(parts[3], parts[4], true);
  const lon = nmeaToDecimal(parts[5], parts[6], false);

  if (!isValidLatLon(lat, lon)) {
    setStatus("Invalid RMC coordinates ignored", "warn");
    return;
  }

  const speedKnots = parseFloat(parts[7]) || 0;
  const heading = parseFloat(parts[8]) || 0;

  const data = {
    lat,
    lon,
    speed: speedKnots * 0.514444, // m/s for compatibility with browser GPS
    heading,
    acc: 5,
    status: currentStatus,
    gpsSource: "serial-rmc",
    gpsTime: Date.now()
  };

  publishFix(data);
}

//////////////////////////////////////////////////////
// GGA PARSER
//////////////////////////////////////////////////////

function parseGGA(sentence) {
  const parts = sentence.split(",");

  const fixQuality = parseInt(parts[6], 10); // 0 invalid, 1 GPS, 2 DGPS, etc.
  if (!fixQuality || fixQuality === 0) {
    setStatus("GGA received but no valid fix", "warn");
    return;
  }

  const lat = nmeaToDecimal(parts[2], parts[3], true);
  const lon = nmeaToDecimal(parts[4], parts[5], false);

  if (!isValidLatLon(lat, lon)) {
    setStatus("Invalid GGA coordinates ignored", "warn");
    return;
  }

  const satellites = parseInt(parts[7], 10) || 0;
  const hdop = parseFloat(parts[8]) || null;

  const data = {
    lat,
    lon,
    speed: lastFix?.speed || 0,
    heading: lastFix?.heading || 0,
    acc: hdop ? Math.round(hdop * 5) : 10,
    status: currentStatus,
    gpsSource: "serial-gga",
    satellites,
    hdop,
    gpsTime: Date.now()
  };

  publishFix(data);
}

//////////////////////////////////////////////////////
// NMEA COORDINATE CONVERSION
//////////////////////////////////////////////////////

function nmeaToDecimal(raw, direction, isLatitude) {
  if (!raw || !direction) return null;

  const degreeLength = isLatitude ? 2 : 3;
  const degrees = parseInt(raw.substring(0, degreeLength), 10);
  const minutes = parseFloat(raw.substring(degreeLength));

  if (Number.isNaN(degrees) || Number.isNaN(minutes)) return null;

  let decimal = degrees + (minutes / 60);

  if (direction === "S" || direction === "W") {
    decimal *= -1;
  }

  return decimal;
}

function isValidLatLon(lat, lon) {
  return (
    typeof lat === "number" &&
    typeof lon === "number" &&
    !Number.isNaN(lat) &&
    !Number.isNaN(lon) &&
    lat >= -90 &&
    lat <= 90 &&
    lon >= -180 &&
    lon <= 180
  );
}

//////////////////////////////////////////////////////
// PUBLISH FIX
//////////////////////////////////////////////////////

function publishFix(data) {
  if (!currentUnitId) return;

  lastValidFixTime = Date.now();
  lastFix = data;

  unitsRef.child(currentUnitId).set(data);
  updateMap(currentUnitId, data);

  const age = new Date(data.gpsTime).toLocaleTimeString();

  setStatus("Serial GPS valid fix", "good");

  setFixDetails(
    `Unit: ${currentUnitId}\n` +
    `Status: ${data.status}\n` +
    `Lat: ${data.lat.toFixed(6)}\n` +
    `Lon: ${data.lon.toFixed(6)}\n` +
    `Speed: ${Math.round((data.speed || 0) * 2.237)} mph\n` +
    `Heading: ${data.heading || 0}\n` +
    `Accuracy est: ${data.acc} m\n` +
    `Source: ${data.gpsSource}\n` +
    `Updated: ${age}`
  );
}

//////////////////////////////////////////////////////
// MAP UPDATE
//////////////////////////////////////////////////////

function markerColor(status, source) {
  if (source && source.startsWith("serial")) return "lime";
  if (status === "10-7") return "red";
  if (status === "10-6") return "orange";
  if (status === "10-8") return "green";
  return "blue";
}

function updateMap(id, data) {
  const speedMph = Math.round((data.speed || 0) * 2.237);
  const updated = data.gpsTime
    ? new Date(data.gpsTime).toLocaleTimeString()
    : "Unknown";

  const color = markerColor(data.status, data.gpsSource);

  const popupHtml = `
    <b>Unit ${id}</b><br>
    Status: ${data.status || "N/A"}<br>
    Source: ${data.gpsSource || "unknown"}<br>
    Speed: ${speedMph} mph<br>
    Updated: ${updated}
  `;

  if (!markers[id]) {
    markers[id] = L.circleMarker([data.lat, data.lon], {
      radius: 8,
      color: color,
      fillColor: color,
      fillOpacity: 0.8
    }).addTo(map);

    markers[id].bindTooltip(`Unit ${id}`, {
      direction: "top"
    });

    markers[id].bindPopup(popupHtml);

  } else {
    markers[id].setLatLng([data.lat, data.lon]);
    markers[id].setStyle({ color, fillColor: color });
    markers[id].setPopupContent(popupHtml);
  }

  map.setView([data.lat, data.lon], 17);
}

//////////////////////////////////////////////////////
// BROWSER GPS FALLBACK
//////////////////////////////////////////////////////

function startBrowserGPS() {
  const id = document.getElementById("unitId").value.trim();
  if (!id) return alert("Enter Unit ID first");

  currentUnitId = id;
  localStorage.setItem("avl_unitId", id);
  localStorage.setItem("avl_mode", userMode || "unit");

  if (browserWatchId !== null) {
    navigator.geolocation.clearWatch(browserWatchId);
  }

  browserWatchId = navigator.geolocation.watchPosition((pos) => {
    const data = {
      lat: pos.coords.latitude,
      lon: pos.coords.longitude,
      speed: pos.coords.speed || 0,
      heading: pos.coords.heading || 0,
      acc: pos.coords.accuracy,
      status: currentStatus,
      gpsSource: "browser",
      gpsTime: Date.now()
    };

    unitsRef.child(id).set(data);
    updateMap(id, data);

    setStatus("Browser GPS active", "good");

  }, (err) => {
    setStatus("Browser GPS error: " + err.message, "bad");
  }, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 10000
  });
}

//////////////////////////////////////////////////////
// LOG OFF / REMOVE UNIT
//////////////////////////////////////////////////////

async function logOffUnit() {
  const id = currentUnitId || document.getElementById("unitId").value.trim();
  if (!id) return alert("Enter Unit ID first");

  if (browserWatchId !== null) {
    navigator.geolocation.clearWatch(browserWatchId);
    browserWatchId = null;
  }

  await disconnectSerialGPS();

  await unitsRef.child(id).remove();

  if (markers[id]) {
    map.removeLayer(markers[id]);
    delete markers[id];
  }

  currentUnitId = null;

  setStatus("Unit logged off", "warn");
  setFixDetails("Unit logged off.");
}

async function forceRemoveUnit() {
  const id = currentUnitId || prompt("Enter Unit ID to remove:");
  if (!id) return;

  if (browserWatchId !== null && id === currentUnitId) {
    navigator.geolocation.clearWatch(browserWatchId);
    browserWatchId = null;
  }

  if (id === currentUnitId) {
    await disconnectSerialGPS();
  }

  await unitsRef.child(id).remove();

  if (markers[id]) {
    map.removeLayer(markers[id]);
    delete markers[id];
  }

  if (id === currentUnitId) {
    currentUnitId = null;
  }

  setStatus(`Unit ${id} removed`, "warn");
  setFixDetails(`Unit ${id} removed.`);
}

// Backward-compatible alias for old Remove Unit button behavior.
function removeUnit() {
  forceRemoveUnit();
}
</script>

</body>
</html>
