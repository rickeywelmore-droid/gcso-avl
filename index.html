<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AVL Dispatch System</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase (compat MUST load before JS) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial;
    }

    #wrap {
      display: flex;
      height: 100%;
    }

    #sidebar {
      width: 340px;
      background: #111;
      color: white;
      padding: 10px;
      overflow-y: auto;
    }

    #map {
      flex: 1;
    }

    .unit {
      background: #222;
      padding: 8px;
      margin: 6px 0;
      cursor: pointer;
    }

    .offline {
      border-left: 4px solid red;
    }

    input, button {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    #details {
      margin-top: 10px;
      padding: 10px;
      background: #1c1c1c;
    }
  </style>
</head>

<body>

<div id="wrap">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h3>AVL Dispatch</h3>

    <input id="unitId" placeholder="Unit ID (e.g. 101)" />

    <button onclick="startUnit()">Start Tracking</button>

    <hr>

    <button onclick="setMode('dispatch')">Dispatch View</button>
    <button onclick="setMode('unit')">Unit View</button>

    <hr>

    <button onclick="setStatus('10-8')">10-8 Available</button>
    <button onclick="setStatus('10-7')">10-7 Out of Service</button>
    <button onclick="setStatus('10-6')">10-6 Busy</button>

    <hr>

    <button onclick="logOffUnit()">Log Off Unit</button>

    <hr>

    <div id="unitList"></div>

    <div id="details">Select a unit</div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

</div>

<script>
console.log("AVL booting...");

//////////////////////////////////////////////////////
// FIREBASE INIT (SAFE ORDER)
//////////////////////////////////////////////////////

const firebaseConfig = {
  apiKey: "AIzaSyA5hXURTrwoUkMRBkI2iEYU74CsG4z_vcU",
  authDomain: "gcso-avl.firebaseapp.com",
  databaseURL: "https://gcso-avl-default-rtdb.firebaseio.com",
  projectId: "gcso-avl"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const unitsRef = db.ref("units");

console.log("Firebase OK");

//////////////////////////////////////////////////////
// MAP INIT
//////////////////////////////////////////////////////

const map = L.map('map').setView([38.9, -84.5], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

console.log("Map OK");

let markers = {};

//////////////////////////////////////////////////////
// STATE
//////////////////////////////////////////////////////

let watchId = null;
let currentUnitId = null;
let mode = "dispatch";

//////////////////////////////////////////////////////
// MODE SWITCH
//////////////////////////////////////////////////////

function setMode(m) {
  mode = m;
  console.log("Mode:", mode);
}

//////////////////////////////////////////////////////
// START UNIT TRACKING
//////////////////////////////////////////////////////

function startUnit() {
  const id = document.getElementById("unitId").value.trim();
  if (!id) return alert("Enter Unit ID");

  currentUnitId = id;

  watchId = navigator.geolocation.watchPosition((pos) => {

    const data = {
      lat: pos.coords.latitude,
      lon: pos.coords.longitude,
      speed: pos.coords.speed || 0,
      heading: pos.coords.heading || 0,
      acc: pos.coords.accuracy,
      status: window.unitStatus || "10-8",
      time: Date.now()
    };

    unitsRef.child(id).set(data);

  }, (err) => {
    alert("GPS error: " + err.message);
  }, {
    enableHighAccuracy: true,
    maximumAge: 0
  });
}

//////////////////////////////////////////////////////
// LOG OFF UNIT
//////////////////////////////////////////////////////

function logOffUnit() {
  if (!currentUnitId) {
    alert("No active unit");
    return;
  }

  if (watchId) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }

  unitsRef.child(currentUnitId).remove();
  currentUnitId = null;

  alert("Unit logged off");
}

//////////////////////////////////////////////////////
// STATUS SYSTEM
//////////////////////////////////////////////////////

function setStatus(status) {
  window.unitStatus = status;

  if (currentUnitId) {
    unitsRef.child(currentUnitId).update({
      status: status,
      time: Date.now()
    });
  }
}

//////////////////////////////////////////////////////
// COLOR SYSTEM
//////////////////////////////////////////////////////

function getColor(status) {
  switch(status) {
    case "10-8": return "green";
    case "10-7": return "red";
    case "10-6": return "orange";
    default: return "blue";
  }
}

//////////////////////////////////////////////////////
// LIVE DISPATCH VIEW
//////////////////////////////////////////////////////

unitsRef.on("value", (snap) => {

  const data = snap.val();
  const list = document.getElementById("unitList");

  list.innerHTML = "";

  if (!data) return;

  Object.keys(data).forEach(id => {
    const u = data[id];
    if (!u) return;

    const age = Date.now() - u.time;
    const offline = age > 20000;

    const color = getColor(u.status);

    const div = document.createElement("div");
    div.className = "unit" + (offline ? " offline" : "");

    div.innerHTML = `
      <b style="color:${color}">${id}</b><br>
      ${u.status || "10-8"}<br>
      ${offline ? "OFFLINE" : "ONLINE"}<br>
      ${Math.round((u.speed || 0) * 2.237)} mph
    `;

    div.onclick = () => {
      map.setView([u.lat, u.lon], 17);

      document.getElementById("details").innerHTML = `
        <b>Unit ${id}</b><br><br>
        Status: ${u.status || "10-8"}<br>
        Speed: ${Math.round((u.speed || 0) * 2.237)} mph<br>
        Heading: ${u.heading || "N/A"}<br>
        Accuracy: ${Math.round(u.acc || 0)} m<br>
        Last update: ${new Date(u.time).toLocaleTimeString()}
      `;
    };

    list.appendChild(div);

    if (!markers[id]) {
      markers[id] = L.circleMarker([u.lat, u.lon], {
        radius: 8,
        color: color,
        fillColor: color,
        fillOpacity: 0.8
      }).addTo(map);
    } else {
      markers[id].setLatLng([u.lat, u.lon]);
      markers[id].setStyle({ color: color, fillColor: color });
    }
  });
});

</script>

</body>
</html>
