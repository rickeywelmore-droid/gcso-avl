<!DOCTYPE html>
<html>
<head>
  <title>Dispatch AVL System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
    body { margin:0; font-family: Arial; display:flex; height:100vh; }

    #sidebar {
      width: 300px;
      background: #111;
      color: white;
      overflow-y: auto;
      padding: 10px;
    }

    #map { flex:1; }

    .unit {
      padding:10px;
      margin:5px 0;
      background:#222;
      cursor:pointer;
      border-left:4px solid limegreen;
    }

    .offline { border-left-color: red; }

    #detail {
      margin-top:10px;
      padding:10px;
      background:#1c1c1c;
    }

    input, button {
      width:100%;
      padding:8px;
      margin:5px 0;
    }
  </style>
</head>

<body>

<div id="sidebar">

  <h3>Dispatch AVL</h3>

  <button onclick="setMode('dispatch')">Dispatch Mode</button>
  <button onclick="setMode('unit')">Unit Mode</button>

  <div id="unitLogin" style="display:none;">
    <input id="unitId" placeholder="Unit ID (e.g. 101)" />
    <button onclick="startUnit()">Start GPS</button>
  </div>

  <div id="unitList"></div>

  <div id="detail">
    <b>Unit Details</b>
    <div id="detailsBox">Click a unit</div>
  </div>

</div>

<div id="map"></div>

<script>

// ---------------- FIREBASE ----------------
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA5hXURTrwoUkMRBkI2iEYU74CsG4z_vcU",
  authDomain: "gcso-avl.firebaseapp.com",
  databaseURL: "https://gcso-avl-default-rtdb.firebaseio.com",
  projectId: "gcso-avl",
  storageBucket: "gcso-avl.firebasestorage.app",
  messagingSenderId: "463504227099",
  appId: "1:463504227099:web:9d522246b11892fc0731be",
  measurementId: "G-XJN8PCBHYE"
};

// ---------------- MAP ----------------
const map = L.map('map').setView([39, -84], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// ---------------- STATE ----------------
let mode = "dispatch";
let markers = {};
let selectedUnit = null;

// ---------------- MODE SWITCH ----------------
function setMode(m) {
  mode = m;
  document.getElementById("unitLogin").style.display =
    (m === "unit") ? "block" : "none";
}

// ---------------- UNIT MODE ----------------
function startUnit() {
  const id = document.getElementById("unitId").value.trim();
  if (!id) return alert("Enter Unit ID");

  navigator.geolocation.watchPosition(
    (pos) => {

      const data = {
        lat: pos.coords.latitude,
        lon: pos.coords.longitude,
        speed: pos.coords.speed,
        heading: pos.coords.heading,
        acc: pos.coords.accuracy,
        time: Date.now()
      };

      unitsRef.child(id).set(data);
    },
    (err) => alert(err.message),
    { enableHighAccuracy:true, maximumAge:0, timeout:5000 }
  );
}

// ---------------- DISPATCH VIEW ----------------
unitsRef.on("value", (snap) => {
  const data = snap.val();
  if (!data) return;

  const list = document.getElementById("unitList");
  list.innerHTML = "";

  Object.keys(data).forEach(id => {
    const u = data[id];

    const age = Date.now() - u.time;
    const isOffline = age > 15000;

    // sidebar list
    const div = document.createElement("div");
    div.className = "unit" + (isOffline ? " offline" : "");
    div.innerHTML = `
      <b>${id}</b><br/>
      ${isOffline ? "OFFLINE" : "ONLINE"}<br/>
      Speed: ${u.speed ? Math.round(u.speed * 2.237) : 0} mph
    `;

    div.onclick = () => showDetails(id, u);

    list.appendChild(div);

    // map markers
    if (!markers[id]) {
      markers[id] = L.marker([u.lat, u.lon]).addTo(map);
    } else {
      markers[id].setLatLng([u.lat, u.lon]);
    }
  });
});

// ---------------- DETAILS PANEL ----------------
function showDetails(id, u) {
  selectedUnit = id;

  document.getElementById("detailsBox").innerHTML = `
    <b>${id}</b><br/>
    Speed: ${u.speed ? Math.round(u.speed * 2.237) : 0} mph<br/>
    Heading: ${u.heading || "N/A"}<br/>
    Accuracy: ${u.acc} m<br/>
    Last update: ${new Date(u.time).toLocaleTimeString()}
  `;
}

</script>

</body>
</html>
