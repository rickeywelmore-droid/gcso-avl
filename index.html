<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AVL Dispatch System</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial;
    }

    #wrap {
      display: flex;
      height: 100%;
    }

    #sidebar {
      width: 340px;
      background: #111;
      color: white;
      padding: 10px;
      overflow-y: auto;
    }

    #map {
      flex: 1;
    }

    .unit {
      background: #222;
      padding: 8px;
      margin: 6px 0;
      cursor: pointer;
    }

    .offline {
      border-left: 4px solid red;
    }

    input, button, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    #details {
      margin-top: 10px;
      padding: 10px;
      background: #1c1c1c;
    }

    /* LOGIN SCREEN */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
    }

    @media (max-width: 768px) {
      #wrap {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: 40vh;
        overflow-y: auto;
      }

      #map {
        height: 60vh;
      }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>AVL Login</h2>

  <input id="loginUnitId" placeholder="Unit ID" />

  <select id="loginMode">
    <option value="unit">Unit</option>
    <option value="dispatch">Dispatch</option>
  </select>

  <button onclick="login()">Enter System</button>
</div>

<div id="wrap">

  <div id="sidebar">
    <h3>AVL Dispatch</h3>

    <input id="unitId" placeholder="Unit ID (e.g. 101)" />

    <button onclick="startUnit()">Start Tracking</button>

    <hr>

    <button onclick="setStatus('10-8')">10-8 Available</button>
    <button onclick="setStatus('10-7')">10-7 Out</button>
    <button onclick="setStatus('10-6')">10-6 Busy</button>

    <hr>

    <button onclick="logOffUnit()">Log Off Unit</button>
    <button onclick="forceRemoveUnit()">Force Remove</button>

    <hr>

    <button onclick="logout()">Logout</button>

    <hr>

    <div id="unitList"></div>
    <div id="details">Select a unit</div>
  </div>

  <div id="map"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  //////////////////////////////////////////////////////
  // STATE
  //////////////////////////////////////////////////////

  let watchId = null;
  let currentUnitId = null;
  let markers = {};
  let userMode = "unit";

  window.unitStatus = "10-8";

  //////////////////////////////////////////////////////
  // FIREBASE
  //////////////////////////////////////////////////////

  const firebaseConfig = {
    apiKey: "AIzaSyA5hXURTrwoUkMRBkI2iEYU74CsG4z_vcU",
    authDomain: "gcso-avl.firebaseapp.com",
    databaseURL: "https://gcso-avl-default-rtdb.firebaseio.com",
    projectId: "gcso-avl"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const unitsRef = db.ref("units");

  //////////////////////////////////////////////////////
  // AUTO LOGIN (NEW)
  //////////////////////////////////////////////////////

  const savedId = localStorage.getItem("avl_unitId");
  const savedMode = localStorage.getItem("avl_mode");

  if (savedId) {
    currentUnitId = savedId;
    userMode = savedMode || "unit";

    document.getElementById("loginScreen").style.display = "none";
    console.log("Auto login restored:", savedId);
  }

  //////////////////////////////////////////////////////
  // MAP
  //////////////////////////////////////////////////////

  const map = L.map('map').setView([38.9, -84.5], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  //////////////////////////////////////////////////////
  // LOGIN (UPDATED WITH STORAGE)
  //////////////////////////////////////////////////////

  window.login = function () {
    const id = document.getElementById("loginUnitId").value.trim();
    const mode = document.getElementById("loginMode").value;

    if (!id) return alert("Enter ID");

    currentUnitId = id;
    userMode = mode;

    localStorage.setItem("avl_unitId", id);
    localStorage.setItem("avl_mode", mode);

    document.getElementById("loginScreen").style.display = "none";

    console.log("Logged in:", id, mode);
  };

  //////////////////////////////////////////////////////
  // LOGOUT (NEW)
  //////////////////////////////////////////////////////

  window.logout = function () {

    if (watchId) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }

    if (currentUnitId) {
      unitsRef.child(currentUnitId).remove();
    }

    currentUnitId = null;
    userMode = null;

    localStorage.removeItem("avl_unitId");
    localStorage.removeItem("avl_mode");

    document.getElementById("loginScreen").style.display = "flex";

    alert("Logged out");
  };

  //////////////////////////////////////////////////////
  // STATUS
  //////////////////////////////////////////////////////

  window.setStatus = function(status) {
    window.unitStatus = status;

    if (currentUnitId) {
      unitsRef.child(currentUnitId).update({
        status,
        time: Date.now()
      });
    }
  };

  //////////////////////////////////////////////////////
  // START UNIT
  //////////////////////////////////////////////////////

  window.startUnit = function () {
    const id = document.getElementById("unitId").value.trim();
    if (!id) return alert("Enter Unit ID");

    currentUnitId = id;

    watchId = navigator.geolocation.watchPosition((pos) => {

      unitsRef.child(id).set({
        lat: pos.coords.latitude,
        lon: pos.coords.longitude,
        speed: pos.coords.speed || 0,
        heading: pos.coords.heading || 0,
        acc: pos.coords.accuracy,
        status: window.unitStatus,
        time: Date.now()
      });

    }, (err) => alert(err.message), {
      enableHighAccuracy: true
    });
  };

  //////////////////////////////////////////////////////
  // LOGOFF
  //////////////////////////////////////////////////////

  window.logOffUnit = function () {
    if (!currentUnitId) return alert("No active unit");

    if (watchId) navigator.geolocation.clearWatch(watchId);

    unitsRef.child(currentUnitId).remove();

    currentUnitId = null;
    watchId = null;

    alert("Unit logged off");
  };

  //////////////////////////////////////////////////////
  // FORCE REMOVE
  //////////////////////////////////////////////////////

  window.forceRemoveUnit = function () {

    const id = currentUnitId || prompt("Enter Unit ID to remove:");
    if (!id) return;

    if (watchId) navigator.geolocation.clearWatch(watchId);

    unitsRef.child(id).remove();

    if (currentUnitId === id) {
      currentUnitId = null;
      watchId = null;
    }

    alert("Unit removed");
  };

  //////////////////////////////////////////////////////
  // DISPATCH LOOP
  //////////////////////////////////////////////////////

  unitsRef.on("value", (snap) => {

    const data = snap.val();
    const list = document.getElementById("unitList");

    list.innerHTML = "";

    if (!data) return;

    Object.keys(data).forEach(id => {
      const u = data[id];
      if (!u) return;

      const last = u.time || 0;
      const offline = (Date.now() - last) > 20000;

      const color =
        u.status === "10-8" ? "green" :
        u.status === "10-7" ? "red" :
        u.status === "10-6" ? "orange" :
        "blue";

      const div = document.createElement("div");
      div.className = "unit" + (offline ? " offline" : "");

      div.innerHTML = `
        <b style="color:${color}">${id}</b><br>
        ${u.status}<br>
        ${offline ? "OFFLINE" : "ONLINE"}<br>
        ${Math.round((u.speed || 0) * 2.237)} mph
      `;

      div.onclick = () => {
        map.setView([u.lat, u.lon], 17);

        document.getElementById("details").innerHTML = `
          <b>Unit ${id}</b><br><br>
          Status: ${u.status}<br>
          Speed: ${Math.round((u.speed || 0) * 2.237)} mph<br>
          Accuracy: ${Math.round(u.acc || 0)} m<br>
          Last update: ${new Date(u.time).toLocaleTimeString()}
        `;
      };

      list.appendChild(div);

      if (!markers[id]) {
        markers[id] = L.circleMarker([u.lat, u.lon], {
          radius: 8,
          color: color,
          fillColor: color,
          fillOpacity: 0.8
        }).addTo(map);
      } else {
        markers[id].setLatLng([u.lat, u.lon]);
        markers[id].setStyle({ color, fillColor: color });
      }
    });
  });

});
</script>

</body>
</html>
