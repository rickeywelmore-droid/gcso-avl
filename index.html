<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AVL Dispatch System</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial;
    }

    #wrap {
      display: flex;
      height: 100%;
    }

    #sidebar {
      width: 340px;
      background: #111;
      color: white;
      padding: 10px;
      overflow-y: auto;
    }

    #map {
      flex: 1;
    }

    .unit {
      background: #222;
      padding: 8px;
      margin: 6px 0;
      cursor: pointer;
    }

    .offline {
      border-left: 4px solid red;
    }

    input, button {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    #details {
      margin-top: 10px;
      padding: 10px;
      background: #1c1c1c;
    }
  </style>
</head>

<body>

<div id="wrap">

  <div id="sidebar">
    <h3>AVL Dispatch</h3>

    <input id="unitId" placeholder="Unit ID (e.g. 101)" />

    <button onclick="startUnit()">Start Tracking</button>

    <hr>

    <button onclick="setStatus('10-8')">10-8 Available</button>
    <button onclick="setStatus('10-7')">10-7 Out</button>
    <button onclick="setStatus('10-6')">10-6 Busy</button>

    <hr>

    <button onclick="logOffUnit()">Log Off Unit</button>
    <button onclick="forceRemoveUnit()">Force Remove</button>

    <hr>

    <div id="unitList"></div>
    <div id="details">Select a unit</div>
  </div>

  <div id="map"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  //////////////////////////////////////////////////////
  // STATE (GLOBAL SAFE EXPORT)
  //////////////////////////////////////////////////////

  let watchId = null;
  let currentUnitId = null;
  let markers = {};
  window.unitStatus = "10-8";

  //////////////////////////////////////////////////////
  // FIREBASE
  //////////////////////////////////////////////////////

  const firebaseConfig = {
    apiKey: "AIzaSyA5hXURTrwoUkMRBkI2iEYU74CsG4z_vcU",
    authDomain: "gcso-avl.firebaseapp.com",
    databaseURL: "https://gcso-avl-default-rtdb.firebaseio.com",
    projectId: "gcso-avl"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const unitsRef = db.ref("units");

  //////////////////////////////////////////////////////
  // MAP
  //////////////////////////////////////////////////////

  const map = L.map('map').setView([38.9, -84.5], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  //////////////////////////////////////////////////////
  // STATUS
  //////////////////////////////////////////////////////

  window.setStatus = function(status) {
    window.unitStatus = status;

    if (currentUnitId) {
      unitsRef.child(currentUnitId).update({
        status,
        time: Date.now()
      });
    }
  };

  //////////////////////////////////////////////////////
  // START UNIT
  //////////////////////////////////////////////////////

  window.startUnit = function () {
    const id = document.getElementById("unitId").value.trim();
    if (!id) return alert("Enter Unit ID");

    currentUnitId = id;

    watchId = navigator.geolocation.watchPosition((pos) => {

      unitsRef.child(id).set({
        lat: pos.coords.latitude,
        lon: pos.coords.longitude,
        speed: pos.coords.speed || 0,
        heading: pos.coords.heading || 0,
        acc: pos.coords.accuracy,
        status: window.unitStatus,
        time: Date.now()
      });

    }, (err) => alert(err.message), {
      enableHighAccuracy: true
    });
  };

  //////////////////////////////////////////////////////
  // LOGOFF (FIXED SAFE SCOPE)
  //////////////////////////////////////////////////////

  window.logOffUnit = function () {

    if (!currentUnitId) return alert("No active unit");

    if (watchId) navigator.geolocation.clearWatch(watchId);

    unitsRef.child(currentUnitId).remove();

    currentUnitId = null;
    watchId = null;

    alert("Unit logged off");
  };

  //////////////////////////////////////////////////////
  // FORCE REMOVE (FIXED SCOPE)
  //////////////////////////////////////////////////////

  window.forceRemoveUnit = function () {

    const id = currentUnitId || prompt("Enter Unit ID to remove:");
    if (!id) return;

    if (watchId) navigator.geolocation.clearWatch(watchId);

    unitsRef.child(id).remove();

    if (currentUnitId === id) {
      currentUnitId = null;
      watchId = null;
    }

    alert("Unit removed");
  };

  //////////////////////////////////////////////////////
  // DISPATCH LOOP
  //////////////////////////////////////////////////////

  unitsRef.on("value", (snap) => {

    const data = snap.val();
    const list = document.getElementById("unitList");

    list.innerHTML = "";

    if (!data) return;

    Object.keys(data).forEach(id => {
      const u = data[id];
      if (!u) return;

      const offline = (Date.now() - u.time) > 20000;

      const div = document.createElement("div");
      div.className = "unit" + (offline ? " offline" : "");

      div.innerHTML = `
        <b>${id}</b><br>
        ${u.status}<br>
        ${offline ? "OFFLINE" : "ONLINE"}<br>
        ${Math.round((u.speed || 0) * 2.237)} mph
      `;

      div.onclick = () => {
        map.setView([u.lat, u.lon], 17);

        document.getElementById("details").innerHTML = `
          <b>Unit ${id}</b><br><br>
          Status: ${u.status}<br>
          Speed: ${Math.round((u.speed || 0) * 2.237)} mph<br>
          Accuracy: ${Math.round(u.acc || 0)} m<br>
          Last update: ${new Date(u.time).toLocaleTimeString()}
        `;
      };

      list.appendChild(div);

      if (!markers[id]) {
        markers[id] = L.circleMarker([u.lat, u.lon], {
          radius: 8,
          color: "green",
          fillOpacity: 0.7
        }).addTo(map);
      } else {
        markers[id].setLatLng([u.lat, u.lon]);
      }
    });
  });

});
</script>

</body>
</html>
