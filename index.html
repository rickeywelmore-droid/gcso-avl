<script>

///////////////////////////////////////////////////////////
// FIREBASE
///////////////////////////////////////////////////////////

const firebaseConfig = {
  apiKey: "AIzaSyA5hXURTrwoUkMRBkI2iEYU74CsG4z_vcU",
  authDomain: "gcso-avl.firebaseapp.com",
  databaseURL: "https://gcso-avl-default-rtdb.firebaseio.com",
  projectId: "gcso-avl"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const unitsRef = db.ref("units");

console.log("AVL v2 online");

///////////////////////////////////////////////////////////
// MAP
///////////////////////////////////////////////////////////

const map = L.map('map').setView([38.9, -84.5], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let markers = {};

///////////////////////////////////////////////////////////
// STATE
///////////////////////////////////////////////////////////

let watchId = null;
let mode = "dispatch";
let selectedUnit = null;

///////////////////////////////////////////////////////////
// MODE SWITCHING
///////////////////////////////////////////////////////////

function setMode(m) {
  mode = m;

  document.getElementById("unitId").style.display =
    (m === "unit") ? "block" : "block"; // keep visible but structured

  console.log("Mode:", mode);
}

///////////////////////////////////////////////////////////
// UNIT LOGIN / TRACKING
///////////////////////////////////////////////////////////

function startUnit() {
  const id = document.getElementById("unitId").value.trim();
  if (!id) return alert("Enter Unit ID");

  window.currentUnitId = id;

  watchId = navigator.geolocation.watchPosition((pos) => {

    const data = {
      lat: pos.coords.latitude,
      lon: pos.coords.longitude,
      speed: pos.coords.speed || 0,
      heading: pos.coords.heading || 0,
      acc: pos.coords.accuracy,
      status: window.unitStatus || "10-8",
      time: Date.now()
    };

    unitsRef.child(id).set(data);

  }, (err) => alert(err.message), {
    enableHighAccuracy: true,
    maximumAge: 0
  });
}

function logOffUnit() {
  const id = window.currentUnitId;
  if (!id) return alert("No active unit");

  if (watchId) navigator.geolocation.clearWatch(watchId);

  unitsRef.child(id).remove();

  window.currentUnitId = null;
  watchId = null;

  alert("Unit logged off");
}

///////////////////////////////////////////////////////////
// STATUS SYSTEM (NEW)
///////////////////////////////////////////////////////////

function setStatus(status) {
  window.unitStatus = status;

  if (window.currentUnitId) {
    unitsRef.child(window.currentUnitId).update({
      status: status,
      time: Date.now()
    });
  }

  console.log("Status:", status);
}

///////////////////////////////////////////////////////////
// COLOR SYSTEM
///////////////////////////////////////////////////////////

function getColor(status) {
  switch(status) {
    case "10-8": return "green";
    case "10-7": return "red";
    case "10-6": return "orange";
    default: return "blue";
  }
}

///////////////////////////////////////////////////////////
// DISPATCH VIEW
///////////////////////////////////////////////////////////

unitsRef.on("value", (snap) => {

  const data = snap.val();
  const list = document.getElementById("unitList");

  list.innerHTML = "";

  if (!data) return;

  Object.keys(data).forEach(id => {
    const u = data[id];
    if (!u) return;

    const age = Date.now() - u.time;
    const offline = age > 20000;

    const color = getColor(u.status);

    const div = document.createElement("div");
    div.className = "unit" + (offline ? " offline" : "");

    div.innerHTML = `
      <b style="color:${color}">${id}</b><br>
      ${u.status || "10-8"}<br>
      ${offline ? "OFFLINE" : "ONLINE"}<br>
      ${Math.round((u.speed || 0) * 2.237)} mph
    `;

    div.onclick = () => {
      selectedUnit = id;
      map.setView([u.lat, u.lon], 17);

      document.getElementById("details").innerHTML = `
        <b>Unit ${id}</b><br><br>
        Status: ${u.status || "10-8"}<br>
        Speed: ${Math.round((u.speed || 0) * 2.237)} mph<br>
        Heading: ${u.heading || "N/A"}<br>
        Accuracy: ${Math.round(u.acc || 0)} m<br>
        Last update: ${new Date(u.time).toLocaleTimeString()}
      `;
    };

    list.appendChild(div);

    // MARKERS
    if (!markers[id]) {
      markers[id] = L.circleMarker([u.lat, u.lon], {
        radius: 8,
        color: color,
        fillColor: color,
        fillOpacity: 0.8
      }).addTo(map);
    } else {
      markers[id].setLatLng([u.lat, u.lon]);
      markers[id].setStyle({ color: color, fillColor: color });
    }
  });
});

</script>
